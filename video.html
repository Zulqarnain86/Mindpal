<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Consultation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="video-page">
    <div class="video-screen">
        <img src="https://i.pravatar.cc/500?img=48">
        <div class="video-name">
            Dr. Sarah Lim<br>
            <small>Online Counselling Session</small>
        </div>
    </div>

    <div class="user-video">
        <i class="fa-solid fa-user"></i>
        <p>You</p>
    </div>

    <div class="call-time">00:12:35</div>

    <div class="video-controls">
        <button class="control" title="Toggle Microphone">
            <i class="fa-solid fa-microphone"></i>
        </button>
        <button class="control" title="Toggle Video">
            <i class="fa-solid fa-video"></i>
        </button>
        <button class="control" title="Toggle Speaker">
            <i class="fa-solid fa-volume-high"></i>
        </button>
        <button class="end-call" title="End Call">
            <i class="fa-solid fa-phone"></i>
        </button>
    </div>
</div>
<script src="translations.js"></script>
<script src="video.js"></script>
</body>
</html>
