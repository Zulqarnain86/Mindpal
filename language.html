<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="language-page">
    <h1>🌍</h1>
    <h2>Select Your Language</h2>
    <p>Please choose your preferred language.</p>
    <div class="language-list">
        <button class="language-btn">🇬🇧 English</button>
        <button class="language-btn">🇨🇳 中文 (Chinese)</button>
        <button class="language-btn">🇮🇳 தமிழ் (Tamil)</button>
        <button class="language-btn">🇧🇩 বাংলা (Bengali)</button>
        <button class="language-btn">🇮🇩 Bahasa Indonesia</button>
    </div>
    <button id="continueBtn">Continue →</button>
</div>
<script src="language.js"></script>
</body>
</html>
